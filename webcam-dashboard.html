<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UNIGATE — Rete Universitaria</title>

  <!-- Applica il tema PRIMA del rendering per evitare flash -->
  <script>
    (function () {
      var VALID = ['dark','void','blue','light','steel','uda'];
      var p = new URLSearchParams(location.search).get('theme');
      document.documentElement.setAttribute('data-theme', VALID.includes(p) ? p : 'steel');
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ══════════════════════════════════════════════
     ANIMAZIONE DI AVVIO UNIGATE
     Rimossa automaticamente da JS dopo ~4.4s
     ══════════════════════════════════════════════ -->
<div id="unigate-intro">

  <div class="sg-portal">
    <!-- SVG: cerchi concentrici con archi rotanti -->
    <!-- stroke impostato via CSS per supportare var(--accent) -->
    <svg class="sg-svg" viewBox="0 0 300 300">

      <!-- Anello di fondo decorativo -->
      <circle class="sg-ring-full" cx="150" cy="150" r="146" stroke-width="1"/>

      <!-- Arco 1 — grande, orario -->
      <circle class="sg-arc sg-arc-1" cx="150" cy="150" r="134"/>

      <!-- Arco 2 — antiorario -->
      <circle class="sg-arc sg-arc-2" cx="150" cy="150" r="112"/>

      <!-- Arco 3 — orario -->
      <circle class="sg-arc sg-arc-3" cx="150" cy="150" r="90"/>

      <!-- Arco 4 — antiorario -->
      <circle class="sg-arc sg-arc-4" cx="150" cy="150" r="68"/>

      <!-- Arco 5 — orario, interno -->
      <circle class="sg-arc sg-arc-5" cx="150" cy="150" r="46"/>

      <!-- Alone centrale -->
      <circle class="sg-arc-dim" cx="150" cy="150" r="28"
              stroke-width="8" stroke-dasharray="none" stroke-linecap="butt">
        <animate attributeName="r"       values="22;30;22" dur="1.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values=".2;.5;.2" dur="1.4s" repeatCount="indefinite"/>
      </circle>

    </svg>

    <!-- Nucleo luminoso centrale -->
    <div class="sg-core"></div>
  </div>

  <!-- Testo UNIGATE -->
  <div class="sg-text">UNIGATE</div>
  <div class="sg-subtitle">INIZIALIZZAZIONE CONNESSIONE</div>

</div>

<!-- ══════════════════════════════════════════════
     HEADER: [logo host] | [orologio] | [partner]
     ══════════════════════════════════════════════ -->
<header>

  <div class="header-host">
    <div class="host-logo-wrap">
      <img
        src="https://www.unich.it/sites/default/files/logouda_bordooro_bis.png"
        alt="Università D'Annunzio"
        onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
      />
      <div class="host-logo-fallback">UdA</div>
    </div>
    <div class="host-info">
      <div class="unigate-name">
        <span class="unigate-icon"></span>
        UNIGATE
      </div>
      <div class="host-name">Università D'Annunzio · Chieti / Pescara</div>
    </div>
  </div>

  <div class="header-clock">
    <div id="clock">--:--:--</div>
    <div id="date-str">---</div>
  </div>

  <div class="header-partners" id="partner-logos"></div>

</header>

<!-- ══════════════════════════════════════════════
     GRIGLIA FEED
     ══════════════════════════════════════════════ -->
<main id="grid"></main>

<!-- ══════════════════════════════════════════════
     FOCUS TIMER — barra + countdown rotazione
     Visibile solo con ?layout=focus
     ══════════════════════════════════════════════ -->
<div id="focus-timer">
  <div id="focus-bar-wrap"><div id="focus-bar-fill"></div></div>
  <span id="focus-timer-label"></span>
</div>
<div id="focus-countdown"></div>

<!-- ══════════════════════════════════════════════
     FOOTER: stats | ticker | temi | layout | [▼]
     ══════════════════════════════════════════════ -->
<footer>

  <div class="footer-content" id="footer-content">

    <div class="stat">CONNESSE <span id="stat-live">0</span>/<span id="stat-total">0</span></div>
    <div class="stat">NON DISP. <span id="stat-err">0</span></div>

    <div class="ticker-wrap">
      <div class="ticker-track" id="ticker-track"></div>
    </div>

    <!-- Selezione tema — cerchi bicolore (sfondo + accent) -->
    <div class="theme-switcher" id="theme-switcher">
      <button class="theme-btn" data-theme="dark"  title="dark — Scuro"></button>
      <button class="theme-btn" data-theme="void"  title="void — Nero LED"></button>
      <button class="theme-btn" data-theme="blue"  title="blue — Navy"></button>
      <button class="theme-btn" data-theme="light" title="light — Chiaro"></button>
      <button class="theme-btn" data-theme="steel" title="steel — Acciaio"></button>
      <button class="theme-btn" data-theme="uda"   title="uda — Bordeaux"></button>
    </div>

    <!-- Selezione layout -->
    <div class="layout-switcher">

      <button class="layout-btn" data-layout="grid" title="Griglia 3×3">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="currentColor">
          <rect x="0" y="0" width="5" height="5" rx="1"/>
          <rect x="8" y="0" width="5" height="5" rx="1"/>
          <rect x="0" y="8" width="5" height="5" rx="1"/>
          <rect x="8" y="8" width="5" height="5" rx="1"/>
        </svg>
      </button>

      <button class="layout-btn" data-layout="featured" title="In evidenza — 1 grande + 8 piccoli">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="currentColor">
          <rect x="0" y="0" width="8" height="8" rx="1"/>
          <rect x="9" y="0" width="4" height="4" rx="1"/>
          <rect x="9" y="5" width="4" height="4" rx="1"/>
          <rect x="0" y="9" width="4" height="4" rx="1"/>
          <rect x="5" y="9" width="4" height="4" rx="1"/>
          <rect x="9" y="10" width="4" height="3" rx="1"/>
        </svg>
      </button>

      <button class="layout-btn" data-layout="focus" title="Rotazione — 1 grande + sidebar">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="currentColor">
          <rect x="0" y="0" width="8" height="13" rx="1"/>
          <rect x="9" y="0" width="4" height="3" rx="1"/>
          <rect x="9" y="4" width="4" height="3" rx="1"/>
          <rect x="9" y="8" width="4" height="3" rx="1"/>
          <rect x="9" y="12" width="4" height="1" rx=".5"/>
        </svg>
      </button>

    </div>

    <div class="footer-brand">UNIGATE NETWORK · RETE UNIVERSITARIA EUROPEA</div>

  </div><!-- /footer-content -->

  <!-- Pulsante collassa/espandi — sempre visibile -->
  <button id="footer-toggle" title="Comprimi / Espandi barra">
    <svg width="11" height="7" viewBox="0 0 11 7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="1,1 5.5,6 10,1"/>
    </svg>
  </button>

</footer>

<!-- ══════════════════════════════════════════════
     MODAL FULLSCREEN
     ══════════════════════════════════════════════ -->
<div id="modal">
  <button id="modal-close">✕</button>
  <div id="modal-label"></div>
  <video id="modal-video" autoplay muted playsinline controls></video>
</div>

<!-- Ordine obbligatorio: hls → config → app -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>

</body>
</html>
